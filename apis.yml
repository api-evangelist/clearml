modified: '2026-05-08'
specificationVersion: '0.19'
apis:
  - aid: clearml:clearml-rest-api
    name: ClearML REST API
    humanURL: https://clear.ml/docs/latest/docs/references/api/index/
    baseURL: https://api.clear.ml
    tags:
      - REST
      - Experiments
      - Tasks
      - Models
      - Pipelines
    description: >-
      The ClearML REST API is organized into services: auth (login/credentials),
      projects, tasks (experiments), workers, models, queues, events, pipelines, and
      reports. Authentication uses access/secret-key pairs minted in the UI; SDK clients
      handle token exchange against the auth.login endpoint.
    properties:
      - type: Documentation
        url: https://clear.ml/docs/latest/docs/references/api/index/
      - type: Authentication
        url: https://clear.ml/docs/latest/docs/references/api/login
      - type: SDK
